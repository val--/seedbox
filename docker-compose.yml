services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
    ports:
      - 8080:8080
      - 6881:6881/tcp
      - 6881:6881/udp
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "container:gluetun"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${APPS_DATA_PATH}/qbittorrent/config:/config
      - ${STORAGE_PATH}:/data # Racine pour Hardlinks
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPS_DATA_PATH}/prowlarr/config:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    ports:
      - 8191:8191
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPS_DATA_PATH}/radarr/config:/config
      - ${STORAGE_PATH}:/data
      - ${NAS_VIDEO_PATH}/Films:/nas_films
    ports:
      - 7878:7878
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPS_DATA_PATH}/sonarr/config:/config
      - ${STORAGE_PATH}:/data
      - ${NAS_VIDEO_PATH}/Series:/nas_series
    ports:
      - 8989:8989
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPS_DATA_PATH}/bazarr/config:/config
      - ${STORAGE_PATH}:/data
      - ${NAS_VIDEO_PATH}/Films:/nas_films
      - ${NAS_VIDEO_PATH}/Series:/nas_series
    ports:
      - 6767:6767
    restart: unless-stopped

  radarr-cleaner:
    image: python:3.9-slim
    container_name: radarr-cleaner
    environment:
      - PYTHONUNBUFFERED=1
      - RADARR_URL=${RADARR_URL}
      - RADARR_API_KEY=${RADARR_API_KEY}
      - CHECK_INTERVAL=${CHECK_INTERVAL}
    volumes:
      - ${CLEANER_SCRIPT_PATH}:/app/cleaner.py
    command: sh -c "pip install requests && python /app/cleaner.py"
    restart: unless-stopped
